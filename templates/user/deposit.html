{% extends 'layout/base.html' %}
{% block title %}Deposit | SecureBank{% endblock %}
{% block content %}
<div class="py-4" data-aos="fade-up">
    <div class="glass-card p-4 p-md-5 mx-auto banking-form-card">
        <h3 class="text-white mb-1"><i class="fa-solid fa-circle-plus me-2"></i>Deposit Money</h3>
        <p class="text-white-50 mb-4">Current Balance: ₹{{ "%.2f"|format(user.balance) }}</p>
        <form method="POST" id="bankingForm" data-confirm-title="Confirm Deposit" data-confirm-body="Are you sure you want to deposit this amount?">
            <div class="mb-3">
                <label class="form-label text-white-50">Amount (₹)</label>
                <input type="number" name="amount" class="form-control form-control-lg" min="1" step="0.01" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-white-50">Description</label>
                <input type="text" name="description" class="form-control" placeholder="Cash Deposit">
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100"><i class="fa-solid fa-check me-2"></i>Deposit</button>
        </form>
    </div>
</div>
{% include 'user/_confirm_modal.html' %}
{% endblock %}
{% block extra_js %}<script src="{{ url_for('static', filename='js/banking.js') }}"></script>{% endblock %}
