{% extends 'layout/base.html' %}
{% block title %}Withdraw | SecureBank{% endblock %}
{% block content %}
<div class="py-4" data-aos="fade-up">
    <div class="glass-card p-4 p-md-5 mx-auto banking-form-card">
        <h3 class="text-white mb-1"><i class="fa-solid fa-circle-minus me-2"></i>Withdraw Money</h3>
        <p class="text-white-50 mb-4">Available Balance: ₹{{ "%.2f"|format(user.balance) }}</p>
        <form method="POST" id="bankingForm" data-confirm-title="Confirm Withdrawal" data-confirm-body="Are you sure you want to withdraw this amount?">
            <div class="mb-3">
                <label class="form-label text-white-50">Amount (₹)</label>
                <input type="number" name="amount" class="form-control form-control-lg" min="1" max="{{ user.balance }}" step="0.01" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-white-50">Description</label>
                <input type="text" name="description" class="form-control" placeholder="Cash Withdrawal">
            </div>
            <button type="submit" class="btn btn-warning btn-lg w-100 text-dark" {% if security.disable_withdraw %}disabled{% endif %}>
                {% if security.disable_withdraw %}
                    Withdraw Disabled (Security)
                {% else %}
                    <i class="fa-solid fa-check me-2"></i>Withdraw
                {% endif %}
            </button>
        </form>
    </div>
</div>
{% include 'user/_confirm_modal.html' %}
{% endblock %}
{% block extra_js %}<script src="{{ url_for('static', filename='js/banking.js') }}"></script>{% endblock %}
